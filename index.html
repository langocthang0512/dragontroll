function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
function rect(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
function saveProgress(i){ localStorage.setItem(SAVE_KEY, String(i)); }

function resetRunStateToCheckpoint(text){
  // Reset traps/moving/falling platforms for this life, but keep current checkpoint.
  const cpX = player.checkpointX, cpY = player.checkpointY;
  level = deepClone(baseLevel);
  player.checkpointX = cpX; player.checkpointY = cpY;
  player.x = cpX; player.y = cpY;
  player.vx = 0; player.vy = 0;
  msg = text; deaths++;
  cameraX = Math.max(0, Math.min(level.width-W, player.x-W*0.42));
}

function loadLevel(i){
  currentLevel = i;
  baseLevel = deepClone(levels[i]);
  level = deepClone(baseLevel);
  player.x = level.start.x; player.y = level.start.y;
  player.checkpointX = level.start.x; player.checkpointY = level.start.y;
  player.vx = player.vy = 0; player.ground = false;
  cameraX = 0; levelCleared = false;
  msg = level.name;
}

function newGame(){
  localStorage.removeItem(SAVE_KEY);
  currentLevel = 0; deaths = 0; loadLevel(0); state = "playing";
}

function getAllPlatforms(){
  return [...(level.platforms||[]), ...(level.crumbly||[]), ...(level.moving||[])].filter(p => !p.gone);
}

function updateMovingPlatforms(){
  for(const m of level.moving || []){
    const oldX = m.x, oldY = m.y;
    if(m.axis === "x"){
      m.x += m.speed * m.dir;
      if(m.x < m.minX || m.x > m.maxX){ m.dir *= -1; m.x += m.speed * m.dir; }
    } else {
      m.y += m.speed * m.dir;
      if(m.y < m.minY || m.y > m.maxY){ m.dir *= -1; m.y += m.speed * m.dir; }
    }
    m.dx = m.x - oldX; m.dy = m.y - oldY;
  }
}

function handleCrumbly(){
  for(const c of level.crumbly || []){
    if(c.gone) continue;
    const standing = player.x + player.w > c.x && player.x < c.x+c.w && Math.abs((player.y+player.h)-c.y) < 4 && player.vy >= 0;
    if(standing && !c.fall){
      c.timer++;
      if(c.timer >= c.delay){ c.fall = true; c.vy = 1.5; msg = "Ground collapsed!"; }
    }
    if(c.fall){
      c.vy += 0.55; c.y += c.vy;
      if(c.y > H+80) c.gone = true;
    }
  }
}

function update(){
  if(state !== "playing") return;
  if(levelCleared){
    if(keys["enter"] && currentLevel < levels.length-1){ loadLevel(currentLevel+1); keys["enter"]=false; }
    if(keys["r"] && currentLevel === levels.length-1){ newGame(); keys["r"]=false; }
    return;
  }

  updateMovingPlatforms();

  // Horizontal movement, ice level has some slippery acceleration.
  if(level.ice){
    if(keys["a"] || keys["arrowleft"]){ player.vx -= 0.55; player.face=-1; }
    else if(keys["d"] || keys["arrowright"]){ player.vx += 0.55; player.face=1; }
    else player.vx *= 0.94;
    player.vx = Math.max(-6.2, Math.min(6.2, player.vx));
  } else {
    player.vx = 0;
    if(keys["a"] || keys["arrowleft"]){ player.vx = -5; player.face=-1; }
    if(keys["d"] || keys["arrowright"]){ player.vx = 5; player.face=1; }
  }
  if((keys[" "] || keys["w"] || keys["arrowup"]) && player.ground) player.vy = -14;

  player.x += player.vx;
  for(const p of getAllPlatforms()){
    if(rect(player,p)){
      if(player.vx > 0) player.x = p.x - player.w;
      if(player.vx < 0) player.x = p.x + p.w;
    }
  }

  player.vy += 0.7;
  player.y += player.vy;
  player.ground = false;

  for(const p of getAllPlatforms()){
    if(rect(player,p)){
      if(player.vy > 0){
        player.y = p.y - player.h;
        player.vy = 0; player.ground = true;
        if(p.dx){ player.x += p.dx; }
        if(p.dy){ player.y += p.dy; }
      } else if(player.vy < 0){
        player.y = p.y + p.h; player.vy = 0;
      }
    }
  }

  handleCrumbly();

  if(player.y > H+160) resetRunStateToCheckpoint("Void dragon moment.");

  for(const s of level.spikes || []) if(rect(player,s)) resetRunStateToCheckpoint("Classic spike. Classic pain.");
  for(const l of level.lava || []) if(rect(player,l)) resetRunStateToCheckpoint("Lava bath. Not recommended.");

  for(const cp of level.checkpoints || []){
    if(rect(player,cp)){
      if(cp.real){
        player.checkpointX = cp.x;
        player.checkpointY = cp.y - player.h;
        msg = "Checkpoint saved.";
      } else resetRunStateToCheckpoint("Fake checkpoint. Evil dev moment.");
    }
  }

  for(const g of level.gems || []){
    if(g.active === false) continue;
    if(rect(player,g)){
      g.active = false;
      if(g.trap === "platform"){ level.platforms.push({x:g.x+20,y:g.y+10,w:100,h:20}); msg = "Gem created suspicious land."; }
      if(g.trap === "enemy"){ level.enemies.push({x:g.x+30,y:g.y+10,w:34,h:34,left:g.x,right:g.x+190,speed:3}); msg = "Surprise goblin."; }
      if(g.trap === "fall"){ level.fallingBlocks.push({x:g.x-22,y:50,startY:50,w:60,h:60,vy:0,active:true,triggered:true}); msg = "That gem called a meteor."; }
      if(g.trap === "spike"){ level.spikes.push({x:g.x-20,y:g.y+32,w:70,h:42}); msg = "Gem spawned spikes. Rude."; }
      if(g.trap === "iceSpike"){ level.spikes.push({x:g.x+25,y:g.y+60,w:60,h:42}); msg = "Ice gem made teeth."; }
      if(g.trap === "wind"){ player.x -= 90; player.vx = -12; msg = "Wind says go back."; }
      if(g.trap === "fakeWin"){ msg = "Fake victory gem. Keep moving."; }
      if(g.trap === "boss"){
        level.enemies.push({x:g.x+100,y:g.y-20,w:70,h:70,left:g.x+60,right:g.x+360,speed:4,boss:true});
        level.fallingBlocks.push({x:g.x+230,y:40,startY:40,w:70,h:70,vy:0,active:true,triggered:true});
        msg = "Ancient dragon woke up.";
      }
    }
  }

  for(const b of level.fallingBlocks || []){
    if(!b.triggered && Math.abs((player.x+player.w/2)-(b.x+b.w/2)) < 95){ b.active=true; b.triggered=true; }
    if(b.active){ b.vy += 0.6; b.y += b.vy; }
    if(rect(player,b)) resetRunStateToCheckpoint("Bonk! Falling rock trap.");
    if(b.y > H+100){ b.active=false; b.gone=true; }
  }
  level.fallingBlocks = (level.fallingBlocks || []).filter(b => !b.gone);

  for(const e of level.enemies || []){
    e.x += e.speed;
    if(e.x < e.left || e.x + e.w > e.right){ e.speed *= -1; e.x += e.speed; }
    if(rect(player,e)) resetRunStateToCheckpoint(e.boss ? "Boss hugged too hard." : "Tiny dragon got bullied.");
  }

  for(const t of level.textTraps || []){
    if(!t.done && rect(player,t)){
      t.done = true; msg = t.msg;
      level.fallingBlocks.push({x:player.x+90,y:70,startY:70,w:48,h:48,vy:0,active:true,triggered:true});
    }
  }

  if(rect(player, level.egg)){
    levelCleared = true;
    if(currentLevel < levels.length-1){ saveProgress(currentLevel+1); msg = "Level cleared! Press ENTER."; }
    else { saveProgress(0); msg = "YOU WIN! Press R to restart."; }
  }

  cameraX = Math.max(0, Math.min(level.width-W, player.x-W*0.42));
}

function drawSky(){
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0, level.bg[0]); grd.addColorStop(1, level.bg[1]);
  ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = "rgba(255,255,255,0.28)";
  for(let i=0;i<10;i++){
    const x = ((i*330-cameraX*0.2)%(W+350))-140, y = 45+(i%4)*55;
    ctx.fillRect(x,y,85,18); ctx.fillRect(x+30,y-12,95,22); ctx.fillRect(x+85,y+5,60,14);
  }
}

function drawDragon(x,y,face){
  ctx.save(); ctx.translate(Math.floor(x-cameraX), Math.floor(y));
  if(face === -1){ ctx.translate(42,0); ctx.scale(-1,1); }
  // Original cute pixel dragon, fantasy hatchling vibe, not copied asset.
  ctx.fillStyle="#7b45ff"; ctx.fillRect(4,12,30,18); ctx.fillRect(10,6,18,10); ctx.fillRect(28,7,18,19);
  ctx.fillStyle="#5f2fd1"; ctx.fillRect(6,29,8,7); ctx.fillRect(25,29,8,7); ctx.fillRect(2,18,8,8);
  ctx.fillStyle="#b78cff"; ctx.fillRect(10,16,18,6); ctx.fillRect(32,12,9,6);
  ctx.fillStyle="#ffcf4d"; ctx.fillRect(31,1,4,7); ctx.fillRect(39,1,4,7);
  ctx.fillStyle="#ff5d5d"; ctx.fillRect(11,-5,5,11); ctx.fillRect(18,-8,5,14); ctx.fillRect(25,-5,5,11);
  ctx.fillStyle="#ffd166"; ctx.fillRect(43,13,10,4); ctx.fillRect(46,10,5,10);
  ctx.fillStyle="#fff"; ctx.fillRect(38,10,5,5); ctx.fillStyle="#111"; ctx.fillRect(40,12,2,2);
  ctx.fillStyle="#5f2fd1"; ctx.fillRect(-4,17,9,5); ctx.fillRect(-8,19,6,4);
  ctx.restore();
}

function drawBossEnemy(e){
  ctx.fillStyle="#2b164f"; ctx.fillRect(e.x,e.y,e.w,e.h);
  ctx.fillStyle="#ff5555"; ctx.fillRect(e.x+10,e.y-15,10,15); ctx.fillRect(e.x+45,e.y-15,10,15);
  ctx.fillStyle="#fff"; ctx.fillRect(e.x+45,e.y+18,8,8);
  ctx.fillStyle="#111"; ctx.fillRect(e.x+49,e.y+21,3,3);
}

function drawWorld(){
  drawSky(); ctx.save(); ctx.translate(-cameraX,0);

  for(const p of level.platforms||[]){
    ctx.fillStyle = level.ice ? "#90e0ef" : "#43aa52"; ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle = level.ice ? "#48cae4" : "#2f7d32"; ctx.fillRect(p.x,p.y+p.h-7,p.w,7);
  }
  for(const c of level.crumbly||[]){
    if(c.gone) continue;
    ctx.fillStyle = c.fall ? "#9a7b4f" : "#b08968"; ctx.fillRect(c.x,c.y,c.w,c.h);
    ctx.fillStyle="#6f4e37"; for(let x=c.x+8;x<c.x+c.w-8;x+=22) ctx.fillRect(x,c.y+7,12,4);
  }
  for(const m of level.moving||[]){
    ctx.fillStyle="#ffd166"; ctx.fillRect(m.x,m.y,m.w,m.h);
    ctx.fillStyle="#9d6b00"; ctx.fillRect(m.x,m.y+m.h-5,m.w,5);
  }
  for(const l of level.lava||[]){
    ctx.fillStyle="#ff3b1f"; ctx.fillRect(l.x,l.y,l.w,l.h);
    ctx.fillStyle="#ffd166"; for(let x=l.x;x<l.x+l.w;x+=24) ctx.fillRect(x,l.y+6,12,6);
  }
  for(const s of level.spikes||[]){
    ctx.fillStyle = level.ice ? "#caf0f8" : "#df2935";
    ctx.beginPath(); ctx.moveTo(s.x,s.y+s.h); ctx.lineTo(s.x+s.w/2,s.y); ctx.lineTo(s.x+s.w,s.y+s.h); ctx.fill();
  }
  for(const b of level.fallingBlocks||[]){
    ctx.fillStyle = level.ice ? "#caf0f8" : "#8b5e34"; ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.fillStyle = level.ice ? "#90e0ef" : "#5c3d22"; ctx.fillRect(b.x+8,b.y+8,b.w-16,b.h-16);
  }
  for(const e of level.enemies||[]){
    if(e.boss){ drawBossEnemy(e); continue; }
    ctx.fillStyle="#c1121f"; ctx.fillRect(e.x,e.y,e.w,e.h);
    ctx.fillStyle="#fff"; ctx.fillRect(e.x+7,e.y+8,5,5); ctx.fillRect(e.x+22,e.y+8,5,5);
    ctx.fillStyle="#111"; ctx.fillRect(e.x+9,e.y+10,2,2); ctx.fillRect(e.x+24,e.y+10,2,2);
  }
  for(const g of level.gems||[]){
    if(g.active === false) continue;
    ctx.fillStyle="#ffd700"; ctx.fillRect(g.x+8,g.y,8,5); ctx.fillRect(g.x+4,g.y+5,16,10); ctx.fillRect(g.x+8,g.y+15,8,8);
  }
  for(const cp of level.checkpoints||[]){
    ctx.fillStyle = cp.real ? "#3a86ff" : "#8d99ae"; ctx.fillRect(cp.x,cp.y,cp.w,cp.h);
    ctx.fillStyle="#fff"; ctx.fillRect(cp.x+10,cp.y+8,18,12);
  }
  ctx.fillStyle="#ffe066"; ctx.beginPath(); ctx.ellipse(level.egg.x+22,level.egg.y+45,22,45,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#ff9f1c"; ctx.fillRect(level.egg.x+15,level.egg.y+25,8,8); ctx.fillRect(level.egg.x+28,level.egg.y+45,8,8);

  ctx.restore(); drawDragon(player.x,player.y,player.face);
}

function drawHUD(){
  ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(12,12,570,96);
  ctx.fillStyle="#fff"; ctx.font="22px Arial"; ctx.fillText(level.name,24,40);
  ctx.font="18px Arial"; ctx.fillText(msg,24,68); ctx.fillText("Deaths: "+deaths+" | Level "+(currentLevel+1)+"/5 | Checkpoint saves on blue flag",24,94);
  ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(620,12,320,58);
  ctx.fillStyle="#fff"; ctx.fillText("A/D or Arrow = Move",635,36); ctx.fillText("Space/W/Up = Jump | ESC = Menu",635,60);
}

function drawMenu(){
  if(!level) loadLevel(currentLevel);
  drawSky();
  ctx.fillStyle="rgba(0,0,0,.62)"; ctx.fillRect(210,105,540,330);
  ctx.fillStyle="#fff"; ctx.font="42px Arial"; ctx.fillText("Dragon Troll Island",285,170);
  ctx.font="20px Arial"; ctx.fillText("v1.0 - 5 longer troll levels",355,210);
  ctx.fillText("ENTER: Continue saved level",345,275);
  ctx.fillText("N: New Game",410,315);
  ctx.fillText("Saved level: "+(currentLevel+1)+"/5",405,355);
  ctx.fillText("Traps reset after death/checkpoint respawn.",285,395);
  drawDragon(455+cameraX,225,1);
}

function draw(){
  if(state==="menu"){ drawMenu(); return; }
  drawWorld(); drawHUD();
  if(levelCleared){
    ctx.fillStyle="rgba(0,0,0,.62)"; ctx.fillRect(250,205,470,125);
    ctx.fillStyle="#fff"; ctx.font="28px Arial"; ctx.fillText(msg,300,255);
    ctx.font="20px Arial"; ctx.fillText(currentLevel<levels.length-1 ? "Press ENTER for next level" : "Press R to restart",365,292);
  }
}

function handleKeys(){
  if(state==="menu"){
    if(keys["enter"]){ loadLevel(currentLevel); state="playing"; keys["enter"]=false; }
    if(keys["n"]){ newGame(); keys["n"]=false; }
  } else if(keys["escape"]){ state="menu"; keys["escape"]=false; }
}

function loop(){ handleKeys(); update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
